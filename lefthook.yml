pre-commit:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    format:
      glob: "*.{ts,tsx,js,jsx,mjs,json}"
      run: bun x @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  commands:
    typecheck:
      run: bun run typecheck
